name: Security Audit

on:
    schedule:
        - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
    workflow_dispatch:

jobs:
    cargo-audit:
        name: cargo audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install cargo-audit
              run: cargo install --locked cargo-audit

            - name: Run cargo audit
              run: |
                  cd contracts
                  cargo audit
